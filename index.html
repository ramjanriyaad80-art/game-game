<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Riyaad</title>
<style>
  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background-color: #70c5ce;
  }
  canvas {
    display: block;
    background-color: #70c5ce;
    border: 3px solid #fff;
    border-radius: 12px;
  }
  #restartBtn {
    position: absolute;
    top: 20px;
    padding: 10px 20px;
    font-size: 18px;
    display: none;
    border: none;
    border-radius: 8px;
    background: #ff6961;
    color: white;
    cursor: pointer;
  }
</style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>
<button id="restartBtn">Restart Game</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const restartBtn = document.getElementById("restartBtn");

// Game variables
let birdY, birdX, velocity, score, gameOver;
const GRAVITY = 0.5;
const FLAP = -8;
const pipeWidth = 60;
const pipeGap = 150;
let pipes = [];
let bgHue = 180;

// Load bird image (replace with your URL)
const birdImg = new Image();
birdImg.src = "https://github.com/ramjanriyaad80-art/game-practice/blob/main/WhatsApp%20Image%202026-03-30%20at%208.14.05%20PM.jpeg?raw=true"; // <-- replace with your image URL

function initGame() {
  birdX = 80;
  birdY = canvas.height/2;
  velocity = 0;
  score = 0;
  gameOver = false;
  pipes = [];
  restartBtn.style.display = "none";
}

function addPipe() {
  const pipeTopHeight = Math.random() * (canvas.height - pipeGap - 100) + 50;
  pipes.push({
    x: canvas.width,
    top: pipeTopHeight,
    bottom: pipeTopHeight + pipeGap,
    passed: false
  });
}

// Control flap
function flap() {
  velocity = FLAP;
}

document.addEventListener("keydown", flap);
document.addEventListener("touchstart", flap);

// Restart button
restartBtn.addEventListener("click", () => {
  initGame();
  gameLoop();
});

// Game loop
function gameLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Change background color dynamically
  bgHue += 0.5;
  ctx.fillStyle = `hsl(${bgHue}, 70%, 60%)`;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("Game Over!", 100, canvas.height/2);
    ctx.fillText("Score: " + score, 130, canvas.height/2 + 50);
    restartBtn.style.display = "block";
    return;
  }

  // Draw bird
  velocity += GRAVITY;
  birdY += velocity;
  ctx.drawImage(birdImg, birdX, birdY, 50, 50);

  // Add new pipes
  if(pipes.length === 0 || pipes[pipes.length-1].x < canvas.width - 200) {
    addPipe();
  }

  // Move and draw pipes
  ctx.fillStyle = "#228B22";
  for(let i=0;i<pipes.length;i++){
    const p = pipes[i];
    p.x -= 2;

    ctx.fillRect(p.x,0,pipeWidth,p.top);
    ctx.fillRect(p.x,p.bottom,pipeWidth,canvas.height - p.bottom);

    // Collision
    if(birdX + 50 > p.x && birdX < p.x + pipeWidth && (birdY < p.top || birdY + 50 > p.bottom)) {
      gameOver = true;
    }

    // Score
    if(!p.passed && p.x + pipeWidth < birdX){
      score++;
      p.passed = true;
    }
  }

  // Check if bird hits top or bottom
  if(birdY + 50 > canvas.height || birdY < 0){
    gameOver = true;
  }

  // Draw score
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);

  requestAnimationFrame(gameLoop);
}

birdImg.onload = () => {
  initGame();
  gameLoop();
};
</script>

</body>
</html>
